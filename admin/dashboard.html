<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dashboard — McGovern Estates Admin</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: Helvetica, Arial, sans-serif; background: #f4f4f2; color: #1A1A18; display: flex; min-height: 100vh; }

    /* Sidebar */
    .sidebar {
      width: 240px; flex-shrink: 0;
      background: #1A1A18;
      display: flex; flex-direction: column;
      position: fixed; top: 0; left: 0; bottom: 0;
      z-index: 10;
    }
    .sidebar-logo {
      padding: 1.5rem 1.25rem;
      border-bottom: 1px solid rgba(255,255,255,0.07);
    }
    .sidebar-logo img { height: 40px; display: block; }
    .sidebar-logo span {
      display: block;
      font-size: 0.62rem; font-weight: 600; letter-spacing: 0.18em;
      text-transform: uppercase; color: rgba(255,255,255,0.35);
      margin-top: 0.5rem;
    }
    .sidebar-nav { flex: 1; padding: 1rem 0; }
    .nav-item {
      display: flex; align-items: center; gap: 10px;
      padding: 0.75rem 1.25rem;
      font-size: 0.85rem; color: rgba(255,255,255,0.6);
      text-decoration: none;
      transition: all 0.15s;
      cursor: pointer; border: none; background: none;
      width: 100%; text-align: left;
    }
    .nav-item:hover { background: rgba(255,255,255,0.05); color: #fff; }
    .nav-item.active { background: rgba(200,0,125,0.15); color: #fff; border-left: 2px solid #C8007D; }
    .nav-item svg { flex-shrink: 0; opacity: 0.7; }
    .nav-item.active svg { opacity: 1; }
    .sidebar-footer {
      padding: 1rem 1.25rem;
      border-top: 1px solid rgba(255,255,255,0.07);
    }
    .user-info { font-size: 0.75rem; color: rgba(255,255,255,0.4); margin-bottom: 0.75rem; word-break: break-all; }
    .btn-logout {
      display: flex; align-items: center; gap: 8px;
      font-size: 0.78rem; color: rgba(255,255,255,0.5);
      background: none; border: none; cursor: pointer;
      padding: 0; transition: color 0.15s;
    }
    .btn-logout:hover { color: #fff; }

    /* Main content */
    .main { margin-left: 240px; flex: 1; padding: 2rem; }

    /* Top bar */
    .top-bar {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 2rem;
    }
    .top-bar h1 { font-size: 1.5rem; font-weight: 400; color: #1A1A18; }
    .btn-primary {
      background: #C8007D; color: #fff;
      border: none; padding: 10px 22px;
      font-family: Helvetica, Arial, sans-serif;
      font-size: 0.82rem; font-weight: 500;
      letter-spacing: 0.06em; text-transform: uppercase;
      cursor: pointer; text-decoration: none;
      display: inline-flex; align-items: center; gap: 8px;
      transition: background 0.15s;
    }
    .btn-primary:hover { background: #a0006a; }

    /* Stats */
    .stats-row {
      display: grid; grid-template-columns: repeat(4, 1fr);
      gap: 1rem; margin-bottom: 2rem;
    }
    .stat-card {
      background: #fff; border: 1px solid rgba(26,26,24,0.08);
      padding: 1.25rem 1.5rem;
    }
    .stat-label { font-size: 0.7rem; font-weight: 600; letter-spacing: 0.12em; text-transform: uppercase; color: #6B6B60; }
    .stat-value { font-size: 2rem; font-weight: 300; color: #1A1A18; margin-top: 0.25rem; }
    .stat-value.pink { color: #C8007D; }

    /* Table */
    .table-card { background: #fff; border: 1px solid rgba(26,26,24,0.08); overflow: hidden; }
    .table-header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 1rem 1.5rem;
      border-bottom: 1px solid rgba(26,26,24,0.08);
    }
    .table-header h2 { font-size: 0.95rem; font-weight: 600; color: #1A1A18; }
    .search-input {
      border: 1px solid rgba(26,26,24,0.15); background: #f8f8f6;
      padding: 8px 14px; font-family: Helvetica, Arial, sans-serif;
      font-size: 0.85rem; color: #1A1A18; outline: none;
      min-width: 220px; transition: border-color 0.2s;
    }
    .search-input:focus { border-color: #C8007D; background: #fff; }
    table { width: 100%; border-collapse: collapse; }
    th {
      text-align: left; padding: 0.75rem 1rem;
      font-size: 0.68rem; font-weight: 600; letter-spacing: 0.12em;
      text-transform: uppercase; color: #6B6B60;
      border-bottom: 1px solid rgba(26,26,24,0.08);
      background: #fafafa;
    }
    td {
      padding: 0.9rem 1rem;
      font-size: 0.85rem; color: #1A1A18;
      border-bottom: 1px solid rgba(26,26,24,0.06);
      vertical-align: middle;
    }
    tr:last-child td { border-bottom: none; }
    tr:hover td { background: #fafafa; }
    .prop-img {
      width: 56px; height: 42px;
      object-fit: cover; display: block;
      background: #eee;
    }
    .status-badge {
      display: inline-block;
      font-size: 0.65rem; font-weight: 600; letter-spacing: 0.1em;
      text-transform: uppercase; padding: 3px 8px;
    }
    .status-sale { background: rgba(200,0,125,0.1); color: #C8007D; }
    .status-let  { background: rgba(0,102,204,0.1); color: #0066cc; }
    .status-agreed { background: rgba(107,107,96,0.1); color: #6B6B60; }
    .featured-dot {
      width: 8px; height: 8px; border-radius: 50%;
      background: #C8007D; display: inline-block;
    }
    .action-btns { display: flex; gap: 0.5rem; }
    .btn-edit, .btn-delete {
      font-size: 0.75rem; font-weight: 500; letter-spacing: 0.05em;
      padding: 5px 12px; border: none; cursor: pointer;
      font-family: Helvetica, Arial, sans-serif;
      text-decoration: none; display: inline-block;
      transition: all 0.15s;
    }
    .btn-edit { background: rgba(26,26,24,0.07); color: #1A1A18; }
    .btn-edit:hover { background: rgba(26,26,24,0.14); }
    .btn-delete { background: rgba(200,0,125,0.08); color: #C8007D; }
    .btn-delete:hover { background: rgba(200,0,125,0.18); }

    /* Empty / loading */
    .table-empty {
      text-align: center; padding: 3rem;
      color: #6B6B60; font-size: 0.9rem;
    }

    /* Toast */
    .toast {
      position: fixed; bottom: 2rem; right: 2rem;
      background: #1A1A18; color: #fff;
      padding: 12px 20px; font-size: 0.85rem;
      opacity: 0; transform: translateY(8px);
      transition: all 0.25s; pointer-events: none;
      z-index: 100;
    }
    .toast.show { opacity: 1; transform: translateY(0); }
    .toast.error { background: #8C005C; }

    /* Confirm modal */
    .modal-overlay {
      display: none; position: fixed; inset: 0;
      background: rgba(0,0,0,0.5); z-index: 50;
      align-items: center; justify-content: center;
    }
    .modal-overlay.open { display: flex; }
    .modal {
      background: #fff; padding: 2rem;
      max-width: 380px; width: 90%;
    }
    .modal h3 { font-size: 1.1rem; font-weight: 500; margin-bottom: 0.5rem; }
    .modal p { font-size: 0.85rem; color: #6B6B60; margin-bottom: 1.5rem; }
    .modal-btns { display: flex; gap: 0.75rem; justify-content: flex-end; }
    .btn-cancel {
      background: #f0f0ee; color: #1A1A18; border: none;
      padding: 9px 18px; font-family: Helvetica, Arial, sans-serif;
      font-size: 0.82rem; cursor: pointer;
    }
    .btn-confirm-delete {
      background: #C8007D; color: #fff; border: none;
      padding: 9px 18px; font-family: Helvetica, Arial, sans-serif;
      font-size: 0.82rem; cursor: pointer;
    }

    @media (max-width: 900px) {
      .sidebar { display: none; }
      .main { margin-left: 0; }
      .stats-row { grid-template-columns: repeat(2, 1fr); }
    }
  </style>
</head>
<body>

<!-- Sidebar -->
<nav class="sidebar">
  <div class="sidebar-logo">
    <img src="https://www.mcgovernestates.ie/Content/Site/mcgovernestates.ie/images/logo.png" alt="McGovern Estates" />
    <span>Admin Panel</span>
  </div>
  <div class="sidebar-nav">
    <a href="dashboard.html" class="nav-item active">
      <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>
      Dashboard
    </a>
    <a href="property.html" class="nav-item">
      <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
      Add Property
    </a>
    <a href="/" class="nav-item" target="_blank">
      <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24"><path d="M18 13v6a2 2 0 01-2 2H5a2 2 0 01-2-2V8a2 2 0 012-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>
      View Website
    </a>
  </div>
  <div class="sidebar-footer">
    <div class="user-info" id="userEmail">Loading…</div>
    <button class="btn-logout" onclick="logout()">
      <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
      Sign out
    </button>
  </div>
</nav>

<!-- Main -->
<main class="main">
  <div class="top-bar">
    <h1>Properties</h1>
    <a href="property.html" class="btn-primary">
      <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
      Add New Property
    </a>
  </div>

  <!-- Stats -->
  <div class="stats-row">
    <div class="stat-card">
      <div class="stat-label">Total Listings</div>
      <div class="stat-value" id="statTotal">—</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">For Sale</div>
      <div class="stat-value pink" id="statSale">—</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">To Let</div>
      <div class="stat-value" id="statLet">—</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Sale / Let Agreed</div>
      <div class="stat-value" id="statAgreed">—</div>
    </div>
  </div>

  <!-- Table -->
  <div class="table-card">
    <div class="table-header">
      <h2>All Properties</h2>
      <input class="search-input" type="text" id="searchInput" placeholder="Search by name or address…" oninput="filterTable()" />
    </div>
    <div id="tableWrap">
      <div class="table-empty">Loading properties…</div>
    </div>
  </div>
</main>

<!-- Delete confirm modal -->
<div class="modal-overlay" id="deleteModal">
  <div class="modal">
    <h3>Delete property?</h3>
    <p id="deleteModalMsg">This will permanently remove the listing from your site.</p>
    <div class="modal-btns">
      <button class="btn-cancel" onclick="closeDeleteModal()">Cancel</button>
      <button class="btn-confirm-delete" onclick="confirmDelete()">Delete</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<script>
  const SUPABASE_URL = 'https://dbrmdeqokplohkjeslkl.supabase.co';
  const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImRicm1kZXFva3Bsb2hramVzbGtsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU4OTU1NTcsImV4cCI6MjA5MTQ3MTU1N30.sN_aUdU98VL7hYsT1BwHGMlJMvkKOd4qYvNbRgHcH-k';
  const sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

  let allProperties = [];
  let deleteTargetId = null;

  // Auth guard
  async function init() {
    const { data: { session } } = await sb.auth.getSession();
    if (!session) { window.location.href = 'login.html'; return; }
    document.getElementById('userEmail').textContent = session.user.email;
    loadProperties();
  }

  async function logout() {
    await sb.auth.signOut();
    window.location.href = 'login.html';
  }

  async function loadProperties() {
    const { data, error } = await sb.from('properties')
      .select('*')
      .order('display_order', { ascending: true })
      .order('created_at', { ascending: false });

    if (error) { showToast('Failed to load properties', true); return; }
    allProperties = data || [];
    updateStats();
    renderTable(allProperties);
  }

  function updateStats() {
    document.getElementById('statTotal').textContent  = allProperties.length;
    document.getElementById('statSale').textContent   = allProperties.filter(p => p.status === 'For Sale').length;
    document.getElementById('statLet').textContent    = allProperties.filter(p => p.status === 'To Let').length;
    document.getElementById('statAgreed').textContent = allProperties.filter(p => p.status.includes('Agreed')).length;
  }

  function statusClass(s) {
    if (s === 'For Sale') return 'status-sale';
    if (s === 'To Let') return 'status-let';
    return 'status-agreed';
  }

  function renderTable(props) {
    const wrap = document.getElementById('tableWrap');
    if (props.length === 0) {
      wrap.innerHTML = '<div class="table-empty">No properties found.</div>';
      return;
    }
    wrap.innerHTML = `
      <table>
        <thead>
          <tr>
            <th>Photo</th>
            <th>Name</th>
            <th>Address</th>
            <th>Price</th>
            <th>Status</th>
            <th>Beds</th>
            <th>Featured</th>
            <th>Actions</th>
          </tr>
        </thead>
        <tbody>
          ${props.map(p => `
            <tr>
              <td><img class="prop-img" src="${p.image || 'https://via.placeholder.com/56x42?text=No+img'}" alt="${p.name}" /></td>
              <td><strong>${p.name}</strong></td>
              <td style="color:#6B6B60">${p.address}</td>
              <td><strong>${p.price}</strong></td>
              <td><span class="status-badge ${statusClass(p.status)}">${p.status}</span></td>
              <td>${p.beds ?? '—'}</td>
              <td>${p.featured ? '<span class="featured-dot" title="Featured"></span>' : '—'}</td>
              <td>
                <div class="action-btns">
                  <a class="btn-edit" href="property.html?id=${p.id}">Edit</a>
                  <button class="btn-delete" onclick="openDeleteModal('${p.id}', '${p.name.replace(/'/g, "\\'")}')">Delete</button>
                </div>
              </td>
            </tr>
          `).join('')}
        </tbody>
      </table>
    `;
  }

  function filterTable() {
    const q = document.getElementById('searchInput').value.toLowerCase();
    renderTable(allProperties.filter(p =>
      p.name.toLowerCase().includes(q) || p.address.toLowerCase().includes(q)
    ));
  }

  // Delete flow
  function openDeleteModal(id, name) {
    deleteTargetId = id;
    document.getElementById('deleteModalMsg').textContent = `Delete "${name}"? This cannot be undone.`;
    document.getElementById('deleteModal').classList.add('open');
  }
  function closeDeleteModal() {
    deleteTargetId = null;
    document.getElementById('deleteModal').classList.remove('open');
  }
  async function confirmDelete() {
    if (!deleteTargetId) return;
    const { error } = await sb.from('properties').delete().eq('id', deleteTargetId);
    closeDeleteModal();
    if (error) { showToast('Failed to delete', true); return; }
    showToast('Property deleted');
    loadProperties();
  }

  // Toast
  function showToast(msg, isError = false) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.className = 'toast show' + (isError ? ' error' : '');
    setTimeout(() => t.classList.remove('show'), 3000);
  }

  init();
</script>
</body>
</html>
